version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore

  # The self-test fixtures under tests/ carry real dependencies; keep them patched so the
  # repository never shows an alert without a fix pull request.
  - package-ecosystem: npm
    directory: /tests/node
    schedule:
      interval: weekly
    commit-message:
      prefix: chore

  - package-ecosystem: nuget
    directory: /tests/dotnet
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
