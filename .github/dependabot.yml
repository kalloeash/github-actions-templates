version: 2

# Minor and patch updates arrive grouped, one pull request per ecosystem per week. Major
# updates arrive individually, so each one gets its own review and its own self-test run.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # The self-test fixtures under tests/ carry real dependencies; keep them patched so the
  # repository never shows an alert without a fix pull request.
  - package-ecosystem: npm
    directory: /tests/node
    schedule:
      interval: weekly
    # The fixtures prefix keeps these bumps out of the changelog; see cliff.toml.
    commit-message:
      prefix: chore(fixtures)
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: nuget
    directory: /tests/dotnet
    schedule:
      interval: weekly
    # The fixtures prefix keeps these bumps out of the changelog; see cliff.toml.
    commit-message:
      prefix: chore(fixtures)
    groups:
      nuget-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
