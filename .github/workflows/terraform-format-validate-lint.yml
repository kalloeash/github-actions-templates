# Run the standard quality gate for a Terraform project in one job: format check, validate,
# and lint, in that order. One job, like node-build-and-test and dotnet-build-and-test, so the
# run stops at the first failing check and every Terraform consumer runs the same three checks
# and cannot drift apart. fmt and tflint run recursively over the whole tree; validate runs
# per root configuration listed in `directories`, because it initializes providers per root.
name: terraform-format-validate-lint

on:
  workflow_call:
    inputs:
      terraform-version:
        description: Terraform version passed to setup-terraform. The default is pinned and bumped centrally; override it to match your project.
        type: string
        default: "1.15.8"
      tflint-version:
        description: tflint version passed to setup-tflint. The default is pinned and bumped centrally; override it to match your project.
        type: string
        default: "v0.63.1"
      directories:
        description: >-
          Newline-separated list of root configuration directories to validate. Defaults to the
          repository root. Formatting and linting always cover the whole tree.
        type: string
        default: "."

permissions:
  contents: read

jobs:
  check:
    name: format, validate, and lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ inputs.terraform-version }}
      - uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: ${{ inputs.tflint-version }}
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Validate each directory
        env:
          DIRECTORIES: ${{ inputs.directories }}
        run: |
          status=0
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "::group::validate $dir"
            if terraform -chdir="$dir" init -backend=false -input=false && terraform -chdir="$dir" validate; then
              echo "$dir: valid"
            else
              echo "::error::terraform validate failed in $dir"
              status=1
            fi
            echo "::endgroup::"
          done <<< "$DIRECTORIES"
          exit "$status"
      - name: Initialize tflint plugins
        env:
          # Raises the GitHub API rate limit for plugin downloads.
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init
      - name: Lint
        run: tflint --recursive
