# Internal release-verification workflow. Runs when a release is published: on the
# release event, the same-repo job references below resolve to the tagged commit, so every
# block executes at the exact code consumers pin, against the same fixtures the self-tests
# use. This is the third layer of the testing model, between the pull-request self-test
# and consumer adoption. A failure opens an issue, so a bad release cannot pass silently.
# security-secret-scan and security-dependency-scan are absent here for the same reasons
# they are absent from .test.yml; the testing section of docs/architecture.md explains.
name: verify-release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  node:
    name: node
    uses: ./.github/workflows/node-build-and-test.yml
    with:
      working-directory: tests/node

  dotnet:
    name: dotnet
    uses: ./.github/workflows/dotnet-build-and-test.yml
    with:
      working-directory: tests/dotnet

  docker:
    name: docker
    uses: ./.github/workflows/docker-build.yml
    with:
      context: tests/docker
      file: tests/docker/Dockerfile
      tags: docker-build-selftest:release

  terraform:
    name: terraform
    uses: ./.github/workflows/terraform-format-validate-lint.yml
    with:
      directories: tests/terraform

  precommit:
    name: precommit
    uses: ./.github/workflows/precommit-run.yml
    with:
      config: tests/precommit/config.yaml

  iac:
    name: iac
    uses: ./.github/workflows/security-iac-scan.yml
    with:
      scan-path: tests

  report:
    name: report a failed verification
    needs: [node, dotnet, docker, terraform, precommit, iac]
    if: ${{ failure() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open an issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create --repo "$REPO" \
            --title "Release $TAG failed verification" \
            --body "One or more blocks failed when run at the released commit. Run: $RUN_URL"
