# Scan the full git history for committed secrets with gitleaks. The unbypassable CI backstop
# to the gitleaks pre-commit hook: the hook catches a secret on a developer's machine before
# it is committed, this block catches anything that reaches the repository, across the whole
# history and for every contributor. gitleaks is version pinned and checksum verified through
# the catalog's install-pinned-tool action and bumped centrally, so a consumer picks up a new
# version with one tag bump.
name: security-secret-scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The scan reads the whole history, not just the checked-out tip.
          fetch-depth: 0
          persist-credentials: false
      # The catalog's own source, checked out at the exact commit of this workflow file,
      # so the block and the install action can never drift apart.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .catalog
          sparse-checkout: actions
          persist-credentials: false
      - name: Install gitleaks
        uses: ./.catalog/actions/install-pinned-tool
        with:
          tool: gitleaks
      # Keep the scanned tree equal to the caller's repository.
      - name: Remove the catalog checkout
        run: rm -rf .catalog
      - name: Scan history
        run: gitleaks git . --redact --no-banner
