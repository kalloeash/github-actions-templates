# Scan the full git history for committed secrets with gitleaks. The unbypassable CI backstop
# to the gitleaks pre-commit hook: the hook catches a secret on a developer's machine before
# it is committed, this block catches anything that reaches the repository, across the whole
# history and for every contributor. gitleaks is version pinned and checksum verified here and
# bumped centrally, so a consumer picks up a new version with one tag bump.
name: security-secret-scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The scan reads the whole history, not just the checked-out tip.
          fetch-depth: 0
          persist-credentials: false
      # Downloaded binaries are checksum-verified against the values published with the
      # release, so a moved or tampered release asset fails the job instead of running.
      - name: Install gitleaks
        run: |
          curl -sSfLo gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          sudo tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm gitleaks.tar.gz
      - name: Scan history
        run: gitleaks git . --redact --no-banner
