# Internal self-test workflow. On every push to main and every pull request it calls each
# block through its same-repo path against a small fixture project under tests/, so a
# change that breaks a block fails here before it can be tagged. A real consumer on a
# pinned tag remains the integration proof; this is the catalog-side floor beneath it.
# Two blocks are not called here: security-secret-scan is consumed directly by .lint.yml,
# which exercises it on the same events, and security-dependency-scan is not exercised in
# the catalog at all; the testing section of docs/architecture.md explains why.
name: self-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One run per ref: a quick follow-up commit cancels the superseded run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: node
    uses: ./.github/workflows/node-build-and-test.yml
    with:
      working-directory: tests/node

  dotnet:
    name: dotnet
    uses: ./.github/workflows/dotnet-build-and-test.yml
    with:
      working-directory: tests/dotnet

  docker:
    name: docker
    uses: ./.github/workflows/docker-build.yml
    with:
      context: tests/docker
      file: tests/docker/Dockerfile
      tags: docker-build-selftest:ci

  terraform:
    name: terraform
    uses: ./.github/workflows/terraform-format-validate-lint.yml
    with:
      directories: tests/terraform

  precommit:
    name: precommit
    uses: ./.github/workflows/precommit-run.yml
    with:
      config: tests/precommit/config.yaml

  iac:
    name: iac
    uses: ./.github/workflows/security-iac-scan.yml
    with:
      scan-path: tests

  # The blocks above exercise install-pinned-tool's pin-table mode on every run; this job
  # exercises the explicit mode (url, sha512, archive-member), which otherwise only runs
  # inside the release workflow and would meet its first failure on release day.
  action-explicit-mode:
    name: action explicit mode
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install git-cliff through the explicit mode
        uses: ./actions/install-pinned-tool
        with:
          tool: git-cliff
          url: https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-x86_64-unknown-linux-gnu.tar.gz
          sha512: e716cce3a07dda41b1e370d6afbd7a59eb3d4739509fb7856aeec8da2be28c0396584e29e106141c1a1c535c1827dbc1f60417524f5cfb1da9e11f700bd00f30
          archive-member: git-cliff-2.13.1/git-cliff
