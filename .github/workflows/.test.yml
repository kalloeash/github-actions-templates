# Internal self-test workflow. Every push and pull request calls each block through its
# same-repo path against a small fixture project under tests/, so a change that breaks a
# block fails here before it can be tagged. A real consumer on a pinned tag remains the
# integration proof; this is the catalog-side floor beneath it. security-dependency-scan
# is the one block not called here: it needs an NVD API key secret and a long first run,
# so its proof stays with its consumers.
name: self-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One run per ref: a quick follow-up commit cancels the superseded run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: node
    uses: ./.github/workflows/node-build-and-test.yml
    with:
      working-directory: tests/node

  dotnet:
    name: dotnet
    uses: ./.github/workflows/dotnet-build-and-test.yml
    with:
      working-directory: tests/dotnet

  docker:
    name: docker
    uses: ./.github/workflows/docker-build.yml
    with:
      context: tests/docker
      file: tests/docker/Dockerfile
      tags: docker-build-selftest:pr

  terraform:
    name: terraform
    uses: ./.github/workflows/terraform-format-validate-lint.yml
    with:
      directories: tests/terraform

  precommit:
    name: precommit
    uses: ./.github/workflows/precommit-run.yml
    with:
      config: tests/precommit/config.yaml

  secret-scan:
    name: secret-scan
    uses: ./.github/workflows/security-secret-scan.yml
