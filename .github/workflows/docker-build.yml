# Build a container image with Buildx, and optionally push it. PR verification and release
# push are the same workflow with different inputs: leave push false to verify the build on a
# pull request, set push true (and pass tags) to publish on release.
name: docker-build

on:
  workflow_call:
    inputs:
      context:
        description: Build context.
        type: string
        default: "."
      file:
        description: Path to the Dockerfile.
        type: string
        default: Dockerfile
      push:
        description: Push the image to the registry. When false the image is built and loaded locally only.
        type: boolean
        default: false
      tags:
        description: Newline-separated image tags passed to docker/build-push-action.
        type: string
        required: true
      labels:
        description: Newline-separated image labels.
        type: string
        default: ""
      platforms:
        description: Target platforms, for example "linux/amd64". Empty uses the builder default.
        type: string
        default: ""
      registry:
        description: Registry to log in to when push is true.
        type: string
        default: ghcr.io
      cache-scope:
        description: Buildx GHA cache scope. Empty uses the calling repository name.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to the registry
        if: ${{ inputs.push }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}
          platforms: ${{ inputs.platforms }}
          cache-from: type=gha,scope=${{ inputs.cache-scope || github.event.repository.name }}
          cache-to: type=gha,scope=${{ inputs.cache-scope || github.event.repository.name }},mode=max
