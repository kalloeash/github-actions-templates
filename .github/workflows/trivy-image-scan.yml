# Scan a container image for known vulnerabilities with Trivy and upload the results to
# GitHub code scanning (the Security tab). Standalone by design: publishing SARIF needs
# security-events: write, and callers often run it on a schedule to catch newly disclosed
# CVEs in an already-published image.
name: trivy-image-scan

on:
  workflow_call:
    inputs:
      image:
        description: Image reference to scan, for example ghcr.io/owner/app:1.2.3.
        type: string
        required: true
      severity:
        description: Comma-separated severities to report and fail on.
        type: string
        default: "CRITICAL,HIGH"
      scanners:
        description: Trivy scanners to run.
        type: string
        default: vuln
      ignore-unfixed:
        description: Ignore vulnerabilities that have no fix available.
        type: boolean
        default: false
      exit-code:
        description: Exit code when findings at the given severity exist. 1 fails the build, 0 reports only.
        type: number
        default: 1
      registry:
        description: Registry to log in to before scanning, needed to pull a private image. Empty to skip.
        type: string
        default: ""
      upload-sarif:
        description: Upload results to GitHub code scanning.
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  scan:
    name: image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Log in to the registry
        if: ${{ inputs.registry != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.severity }}
          scanners: ${{ inputs.scanners }}
          ignore-unfixed: ${{ inputs.ignore-unfixed }}
          exit-code: ${{ inputs.exit-code }}
      - name: Upload results to code scanning
        if: ${{ always() && inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # codeql-bundle-v2.26.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
