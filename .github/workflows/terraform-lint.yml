# Lint Terraform configuration with tflint. Installs tflint, initializes the plugins declared
# in the repository's .tflint.hcl, then lints recursively. The CI owner of the lint check a
# Terraform repo also runs locally through tflint in its editor or pre-commit.
name: terraform-lint

on:
  workflow_call:
    inputs:
      tflint-version:
        description: tflint version passed to setup-tflint. "latest" installs the newest release.
        type: string
        default: latest
      working-directory:
        description: Directory to lint. tflint reads .tflint.hcl here and scans recursively.
        type: string
        default: "."

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: ${{ inputs.tflint-version }}
      - name: Initialize plugins
        working-directory: ${{ inputs.working-directory }}
        env:
          # Raises the GitHub API rate limit for plugin downloads.
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init
      - name: Run tflint
        working-directory: ${{ inputs.working-directory }}
        run: tflint --recursive
