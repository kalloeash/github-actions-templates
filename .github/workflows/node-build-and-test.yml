# Run the standard quality gate for a Node project in one job: format check, lint, type
# check, unit test, and production build, in that order (cheapest checks first). One job,
# like dotnet-build-and-test, so the run stops at the first failing check. Every consumer
# runs the same five checks; a project missing one of these npm scripts fails here by
# design, which keeps consumers' gates from drifting apart.
name: node-build-and-test

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version passed to actions/setup-node, for example "24".
        type: string
        default: "24"
      working-directory:
        description: Directory the npm commands run in.
        type: string
        default: "."

permissions:
  contents: read

jobs:
  build-and-test:
    name: build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
