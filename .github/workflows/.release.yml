# Internal release pipeline. On a vX.Y.Z tag push the check-tag job and the verification
# jobs run first: check-tag catches the manual-step mistakes (a tag whose version has no
# changelog section, a tag on a commit that is not on main), and the verification jobs run
# every block except security-dependency-scan at the exact code consumers pin, against
# the same fixtures the self-tests use (docs/architecture.md, testing section). Only when
# all of them are green does the release job build the notes with git-cliff, publish the
# immutable GitHub Release, and move the floating major tag (for example v0) to the
# released commit. The version tag itself exists from the push, but the release page and
# the floating major wait for verification, so a consumer tracking either can never
# receive an unverified release. A verification failure opens an issue instead and nothing
# is published; the fix is a new version, because full release tags are immutable.
# Verification and publication share one workflow on purpose: a chained design cannot
# work, because the release is created with the default GITHUB_TOKEN, and events created
# with that token never trigger other workflows.
# security-secret-scan runs here even though .test.yml leaves it to the lint workflow,
# because the lint workflow does not run on tags. The floating major carries no release of
# its own, so it stays movable. Not consumable by other repositories.
name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

# Two tags pushed close together must not interleave the floating-major move; queue them.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # The two mistakes the manual steps allow: tagging a version whose changelog section
  # was never merged (or tagging the wrong version), and tagging a commit that is not on
  # main. Both fail here, before anything is published.
  check-tag:
    name: check the tag
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history plus branch refs, so origin/main is available for the ancestry
          # check.
          fetch-depth: 0
          persist-credentials: false
      - name: Check the tag against the changelog and main
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          VERSION="${TAG#v}"
          if ! grep -qF "## [$VERSION]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no section for $VERSION; merge the release commit first, then tag it."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::$TAG points at a commit that is not on main."
            exit 1
          fi

  node:
    name: node
    uses: ./.github/workflows/node-build-and-test.yml
    with:
      working-directory: tests/node

  dotnet:
    name: dotnet
    uses: ./.github/workflows/dotnet-build-and-test.yml
    with:
      working-directory: tests/dotnet

  docker:
    name: docker
    uses: ./.github/workflows/docker-build.yml
    with:
      context: tests/docker
      file: tests/docker/Dockerfile
      tags: docker-build-selftest:release

  terraform:
    name: terraform
    uses: ./.github/workflows/terraform-format-validate-lint.yml
    with:
      directories: tests/terraform

  terraform-plan:
    name: terraform plan
    uses: ./.github/workflows/terraform-plan.yml
    with:
      working-directory: tests/terraform-deploy
      artifact-name: terraform-deploy-plan

  terraform-apply:
    name: terraform apply
    needs: terraform-plan
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working-directory: tests/terraform-deploy
      artifact-name: terraform-deploy-plan
      environment: self-test

  precommit:
    name: precommit
    uses: ./.github/workflows/precommit-run.yml
    with:
      config: tests/precommit/config.yaml

  iac:
    name: iac
    uses: ./.github/workflows/security-iac-scan.yml
    with:
      scan-path: tests

  secret-scan:
    name: secret-scan
    uses: ./.github/workflows/security-secret-scan.yml

  release:
    name: release
    needs: [check-tag, node, dotnet, docker, terraform, terraform-plan, terraform-apply, precommit, iac, secret-scan]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # contents: write creates the GitHub Release and moves the floating major tag.
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
      SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      # git-cliff is not in the pin table on purpose: it publishes SHA-512 checksums and
      # nests the binary in a versioned directory, so it demonstrates the action's
      # explicit mode. v2.13.1.
      - name: Install git-cliff
        uses: ./actions/install-pinned-tool
        with:
          tool: git-cliff
          url: https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-x86_64-unknown-linux-gnu.tar.gz
          sha512: e716cce3a07dda41b1e370d6afbd7a59eb3d4739509fb7856aeec8da2be28c0396584e29e106141c1a1c535c1827dbc1f60417524f5cfb1da9e11f700bd00f30
          archive-member: git-cliff-2.13.1/git-cliff
      - name: Build release notes
        run: git-cliff --config cliff.toml --latest --strip header --output RELEASE_NOTES.md
      # Skip-if-exists makes a re-run of a partially failed workflow resume at the
      # tag-move step instead of failing on the already-published release.
      - name: Publish release
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
          fi
      - name: Move floating major tag
        run: |
          MAJOR="v$(printf '%s' "${TAG#v}" | cut -d. -f1)"
          # Existence check uses the singular git/ref endpoint, which 404s when the tag is
          # absent. The plural git/refs endpoint prefix-matches (v0 would match v0.1.0) and
          # returns 200, which would wrongly route to the update path.
          if gh api "repos/$REPO/git/ref/tags/$MAJOR" >/dev/null 2>&1; then
            gh api -X PATCH "repos/$REPO/git/refs/tags/$MAJOR" -f sha="$SHA" -F force=true >/dev/null
          else
            gh api -X POST "repos/$REPO/git/refs" -f ref="refs/tags/$MAJOR" -f sha="$SHA" >/dev/null
          fi
          echo "moved $MAJOR to $SHA"

  report:
    name: report a failed verification
    needs: [check-tag, node, dotnet, docker, terraform, terraform-plan, terraform-apply, precommit, iac, secret-scan]
    if: ${{ failure() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open an issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULTS: ${{ toJSON(needs) }}
        run: |
          TITLE="Release $TAG failed verification"
          # A re-run of a failed workflow must not file the same report twice.
          if gh issue list --repo "$REPO" --state open -L 100 --json title |
            jq -e --arg t "$TITLE" 'any(.[]; .title == $t)' >/dev/null; then
            echo "an open issue for $TAG already exists, skipping"
            exit 0
          fi
          FAILED="$(printf '%s' "$RESULTS" |
            jq -r '[to_entries[] | select(.value.result != "success") | .key] | join(", ")')"
          gh issue create --repo "$REPO" \
            --title "$TITLE" \
            --body "Failed jobs: $FAILED. The release was not published and the floating major tag did not move. Run: $RUN_URL"
