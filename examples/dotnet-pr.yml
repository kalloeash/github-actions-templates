# Example pull-request gate for a .NET project.
# Copy into .github/workflows/pr.yml in a consuming repository and set the solution path.
name: pr

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    uses: kalloeash/github-actions-templates/.github/workflows/dotnet-build-and-test.yml@v1
    with:
      dotnet-version: "10.0.x"
      solution: MySolution.sln
