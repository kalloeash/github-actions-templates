# Hold open a just-in-time firewall rule on an Azure storage account for the running job.
# Used by terraform-plan and terraform-apply, which share this machinery so a fix lands in
# both at once. allow discovers the runner's public IP, adds it to the account firewall, and
# polls the data plane until the rule is effective; remove deletes the rule with retries.
# The IP travels between the two calls in the RUNNER_IP environment variable. Requires an
# authenticated az session with read and write on the storage account and data-plane read on
# the container.
name: state-firewall-access
description: Temporarily allow the running job through an Azure storage account firewall.

inputs:
  mode:
    description: allow adds the rule and verifies it works; remove deletes it.
    required: true
  storage-account:
    description: Storage account whose firewall is changed.
    required: true
  resource-group:
    description: Resource group of the storage account.
    required: true
  container:
    description: Blob container used to verify the rule is effective. Required in allow mode.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Change the firewall rule
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        STORAGE_ACCOUNT: ${{ inputs.storage-account }}
        RESOURCE_GROUP: ${{ inputs.resource-group }}
        CONTAINER: ${{ inputs.container }}
      run: |
        case "$MODE" in
          allow)
            if [ -z "$CONTAINER" ]; then
              echo "::error::allow mode needs the container input to verify the rule."
              exit 1
            fi
            RUNNER_IP="$(curl -fsS --retry 3 https://api.ipify.org ||
              curl -fsS --retry 3 https://checkip.amazonaws.com)"
            if ! printf '%s' "$RUNNER_IP" | grep -Eq '^[0-9]{1,3}(\.[0-9]{1,3}){3}$'; then
              echo "::error::could not discover the runner's public IP."
              exit 1
            fi
            echo "RUNNER_IP=$RUNNER_IP" >>"$GITHUB_ENV"
            az storage account network-rule add --account-name "$STORAGE_ACCOUNT" \
              --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP" --output none
            # Rules propagate in seconds to minutes, so poll the data plane instead of
            # sleeping a fixed time. A concurrent writer can clobber the rule collection,
            # because the CLI read-modify-writes the whole list, so each attempt re-adds
            # the rule when it went missing. Presence is checked first: adding a
            # duplicate fails.
            for attempt in $(seq 1 12); do
              if az storage blob list --auth-mode login --account-name "$STORAGE_ACCOUNT" \
                --container-name "$CONTAINER" --num-results 1 --output none \
                2>"$RUNNER_TEMP/probe-error.txt"; then
                echo "state reachable after $attempt attempts"
                exit 0
              fi
              PRESENT="$(az storage account network-rule list --account-name "$STORAGE_ACCOUNT" \
                --resource-group "$RESOURCE_GROUP" \
                --query "length(ipRules[?ipAddressOrRange=='$RUNNER_IP'])" --output tsv)"
              if [ "$PRESENT" = "0" ]; then
                echo "the rule went missing, re-adding it"
                az storage account network-rule add --account-name "$STORAGE_ACCOUNT" \
                  --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP" --output none
              fi
              sleep 15
            done
            echo "::error::the state storage account is still unreachable after three minutes. Last probe error follows."
            cat "$RUNNER_TEMP/probe-error.txt"
            exit 1
            ;;
          remove)
            if [ -z "${RUNNER_IP:-}" ]; then
              echo "no rule was added, nothing to remove"
              exit 0
            fi
            # Removing an absent rule is a no-op, so retries are safe.
            for attempt in $(seq 1 3); do
              if az storage account network-rule remove --account-name "$STORAGE_ACCOUNT" \
                --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP" --output none; then
                exit 0
              fi
              sleep 10
            done
            echo "::error::could not remove the firewall rule for $RUNNER_IP. Remove it by hand, or apply the Terraform that owns the account, which will show it as drift."
            exit 1
            ;;
          *)
            echo "::error::mode must be allow or remove."
            exit 1
            ;;
        esac
