# git-cliff configuration. Keep-a-Changelog output from Conventional Commits.
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} **BREAKING CHANGE**{% endif %}
{%- endfor %}
{% endfor %}
"""
trim = false
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Map Conventional-Commit types to Keep-a-Changelog sections.
# Anything not listed is dropped from the changelog.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert", group = "Removed" },
  { message = "^style", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Changed" },
  { message = "^docs", skip = true },
  { message = "^test", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", group = "Changed" },
  { body = ".*security", group = "Security" },
  { breaking = true, group = "Changed" },
]

filter_commits = false
# Catalog release tags are v-prefixed semver. The floating major tag (for example v0) has
# no dots and is intentionally excluded, so git-cliff never treats it as a version.
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
